name: gecko

# Single stack. A bare `docker compose up -d` runs the full prod stack
# (db, riverui, migrate, serve, worker) — no profiles, so platforms like Dokploy
# that issue a bare `up` get everything. mailpit is dev-only (profiles: [dev]).
# Local dev runs the lean subset and serve/worker on the host — see Taskfile
# `compose:up` (`docker compose up -d db riverui`; `task serve` / `task worker`). See DEPLOY.md.

services:
  db:
    image: postgres:16
    restart: always
    env_file: [.env]
    networks: [gecko]
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"   # localhost-only; lets host-run dev serve/worker reach it
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - gecko_db:/var/lib/postgresql/data

  riverui:                             # job dashboard — NO built-in auth (localhost only)
    image: ghcr.io/riverqueue/riverui:latest   # pin to a release tag for stability
    restart: always
    networks: [gecko]
    ports:
      - "127.0.0.1:${RIVERUI_PORT:-8080}:8080"
    environment:
      - PGHOST=db
      - PGPORT=5432
      - PGDATABASE=$POSTGRES_DB
      - PGUSER=$POSTGRES_USER
      - PGPASSWORD=$POSTGRES_PASSWORD
    depends_on:
      db: { condition: service_healthy }   # not serve, so this stays valid under the dev profile

  mailpit:                             # dev-only SMTP catcher; start with `docker compose up -d mailpit`
    image: axllent/mailpit:latest
    profiles: [dev]                    # never starts under a bare `up`; named explicitly in dev
    restart: always
    networks: [gecko]
    ports:
      - "127.0.0.1:8025:8025"          # web UI
      - "127.0.0.1:1025:1025"          # SMTP

  migrate:
    image: ${GECKO_IMAGE:-ghcr.io/danielmichaels/gecko:latest}
    command: [migrate]                 # goose schema migrations, then exits
    env_file: [.env]
    environment:                       # reach the bundled db on the compose network,
      POSTGRES_HOST: db                # overriding host-oriented values in .env
      POSTGRES_PORT: "5432"            # (dev uses localhost:<published> for host processes)
    networks: [gecko]
    restart: "no"
    depends_on:
      db: { condition: service_healthy }

  serve:
    image: ${GECKO_IMAGE:-ghcr.io/danielmichaels/gecko:latest}
    command: [serve]                   # applies River migrations on startup
    env_file: [.env]
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    networks: [gecko]
    restart: always
    ports:
      - "${GECKO_HTTP_PORT:-9090}:${GECKO_HTTP_PORT:-9090}"   # host:container, both = GECKO_HTTP_PORT
    depends_on:
      db: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test: [CMD, curl, -fsS, "http://localhost:${GECKO_HTTP_PORT:-9090}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:                              # needs UDP/53 + TCP/53 egress (DNS + AXFR)
    image: ${GECKO_IMAGE:-ghcr.io/danielmichaels/gecko:latest}
    command: [worker]
    env_file: [.env]
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    networks: [gecko]
    restart: always
    depends_on:
      db: { condition: service_healthy }
      serve: { condition: service_healthy }   # serve migrates River first

volumes:
  gecko_db:

networks:
  gecko:
